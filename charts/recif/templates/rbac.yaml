apiVersion: v1
kind: ServiceAccount
metadata:
  name: recif-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: recif-operator
    app.kubernetes.io/part-of: recif
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: recif-operator
rules:
  - apiGroups: ["agents.recif.dev"]
    resources: ["agents"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agents.recif.dev"]
    resources: ["agents/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agents.recif.dev"]
    resources: ["agents/finalizers"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: recif-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: recif-operator
subjects:
  - kind: ServiceAccount
    name: recif-operator
    namespace: {{ .Release.Namespace }}
