apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: recif-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "agents.localhost"
        - "*.localhost"
