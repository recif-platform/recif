{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: recif-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: recif-postgresql
    app.kubernetes.io/part-of: recif
spec:
  serviceName: recif-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: recif-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recif-postgresql
        app.kubernetes.io/part-of: recif
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.auth.postgresPassword | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: recif-postgresql
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app.kubernetes.io/name: recif-postgresql
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
{{- end }}
