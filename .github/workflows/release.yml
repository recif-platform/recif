name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  cli-binaries:
    name: Build CLI Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/sciences44/recif/internal/cli.Version=${{ github.ref_name }}" \
            -o recif-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} \
            ./cmd/recif/...
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: recif-${{ matrix.goos }}-${{ matrix.goarch }}
          path: recif-*

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  github-release:
    name: Create GitHub Release
    needs: cli-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create checksums
        run: sha256sum recif-* > checksums.txt
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            recif-*
            checksums.txt
          generate_release_notes: true
