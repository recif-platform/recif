version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"

  exclusions:
    paths:
      - vendor
      - dashboard
      - widget
      - docs
      - gen
      - maree
    rules:
      - path: "(.+)_test\\.go"
        linters:
          - gosec
